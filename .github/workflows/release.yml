name: Release Scribo Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto-increment Semantic Version Tag
        id: tag_version
        if: github.ref_type != 'tag'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run Unit Tests
        run: make test

      - name: Package Release Archives
        run: make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.tag_version.outputs.new_tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || steps.tag_version.outputs.new_tag }}
          files: |
            dist/scribo-linux-amd64.tar.gz
            dist/scribo-linux-arm64.tar.gz
            dist/scribo-windows-amd64.zip
            dist/scribo-windows-arm64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
